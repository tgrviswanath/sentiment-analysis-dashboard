name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test-nlp-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install & train
        run: |
          cd nlp-service
          pip install -r requirements.txt pytest ruff
          python train.py
      - name: Lint
        run: cd nlp-service && ruff check .
      - name: Test nlp-service
        run: pytest tests/nlp-service/ -v

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install backend
        run: |
          cd backend
          pip install -r requirements.txt pytest httpx
      - name: Test backend
        run: pytest tests/backend/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Install & test
        run: |
          cd frontend
          npm install
          npm test

  build-push:
    needs: [test-nlp-service, test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push nlp-service
        run: |
          docker build -f docker/Dockerfile.nlp-service -t ghcr.io/${{ github.repository }}/nlp-service:latest ./nlp-service
          docker push ghcr.io/${{ github.repository }}/nlp-service:latest
      - name: Build & push backend
        run: |
          docker build -f docker/Dockerfile.backend -t ghcr.io/${{ github.repository }}/backend:latest ./backend
          docker push ghcr.io/${{ github.repository }}/backend:latest
      - name: Build & push frontend
        run: |
          docker build -f docker/Dockerfile.frontend -t ghcr.io/${{ github.repository }}/frontend:latest ./frontend
          docker push ghcr.io/${{ github.repository }}/frontend:latest
