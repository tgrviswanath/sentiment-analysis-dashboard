version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models

  ui:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: >
      sh -c "pip install streamlit requests matplotlib seaborn &&
             streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api
